services:
  bot:
    build: .
    restart: unless-stopped
    env_file:
      - config/.env
    volumes:
      - ./data:/app/data
    command: ["python", "src/bot.py", "--paper"]

  bot-live:
    build: .
    restart: unless-stopped
    env_file:
      - config/.env
    volumes:
      - ./data:/app/data
    command: ["python", "src/bot.py", "--live"]
    profiles:
      - live
